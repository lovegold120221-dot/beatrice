services:
  tts-api:
    build:
      context: ./tts-api
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped